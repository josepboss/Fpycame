{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold mb-4">Cardinal Status</h1>
<div class="p-6 border rounded bg-gray-50">
    <div class="mb-4">
        <span class="font-semibold">Process Status:</span>
        <span class="px-2 py-1 rounded text-white {{ 'bg-green-500' if status == 'online' else 'bg-red-500' }}">
            {{ status.upper() }}
        </span>
    </div>
    <div class="mb-6">
        <span class="font-semibold">Last Started:</span> {{ uptime }}
    </div>
    <div class="flex space-x-4">
        <form action="/status/action/start" method="post">
            <button type="submit" class="bg-green-600 text-white px-6 py-2 rounded hover:bg-green-700">Start</button>
        </form>
        <form action="/status/action/restart" method="post">
            <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">Restart</button>
        </form>
        <form action="/status/action/stop" method="post">
            <button type="submit" class="bg-red-600 text-white px-6 py-2 rounded hover:bg-red-700">Stop</button>
        </form>
    </div>
</div>
{% endblock %}
